name: pytest

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" || pip install -e .
      - run: pip install numpy scipy scikit-learn matplotlib pytest pytest-cov
      - run: python -m pytest tests/ -v --tb=short --cov=igad --cov-report=term-missing
